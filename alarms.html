<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流量计监控系统 - 报警中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: 600;
            color: #40e0d0;
            text-shadow: 0 0 20px rgba(64, 224, 208, 0.5);
        }

        .navbar-menu {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .navbar-menu a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .navbar-menu a:hover,
        .navbar-menu a.active {
            background: rgba(64, 224, 208, 0.2);
            color: #40e0d0;
        }

        .navbar-user { display: flex; align-items: center; gap: 15px; }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 100, 100, 0.3);
            border: 1px solid rgba(255, 100, 100, 0.5);
            border-radius: 8px;
            color: #ff6b6b;
            cursor: pointer;
        }

        .container { padding: 30px; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 { font-size: 28px; }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-card .value { font-size: 36px; font-weight: 700; }
        .stat-card .label { color: rgba(255, 255, 255, 0.6); margin-top: 8px; }
        
        .stat-card.critical .value { color: #ff6b6b; }
        .stat-card.warning .value { color: #fbbf24; }
        .stat-card.info .value { color: #40e0d0; }
        .stat-card.success .value { color: #4ade80; }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-bar select,
        .filter-bar input {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
        }

        .filter-bar select option { background: #1a1a2e; }

        /* 告警列表 */
        .alarm-list {
            display: grid;
            gap: 15px;
        }

        .alarm-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
        }

        .alarm-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .alarm-card.critical { border-left: 4px solid #ff6b6b; }
        .alarm-card.warning { border-left: 4px solid #fbbf24; }
        .alarm-card.info { border-left: 4px solid #40e0d0; }
        .alarm-card.success { border-left: 4px solid #4ade80; }

        .alarm-icon {
            font-size: 36px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .alarm-card.critical .alarm-icon { background: rgba(255, 107, 107, 0.2); }
        .alarm-card.warning .alarm-icon { background: rgba(251, 191, 36, 0.2); }
        .alarm-card.info .alarm-icon { background: rgba(64, 224, 208, 0.2); }

        .alarm-content { flex: 1; }
        .alarm-content h3 { font-size: 16px; margin-bottom: 8px; }
        .alarm-content p { color: rgba(255, 255, 255, 0.6); font-size: 14px; }
        
        .alarm-meta {
            text-align: right;
            min-width: 150px;
        }
        
        .alarm-time { color: rgba(255, 255, 255, 0.5); font-size: 12px; display: block; margin-bottom: 10px; }
        
        .alarm-actions { display: flex; gap: 8px; }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        .action-btn.confirm {
            background: rgba(64, 224, 208, 0.2);
            color: #40e0d0;
        }

        .action-btn.ignore {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .status-badge.pending { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .status-badge.processing { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .status-badge.resolved { background: rgba(74, 222, 128, 0.2); color: #4ade80; }

        @media (max-width: 1200px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .alarm-card { flex-direction: column; text-align: center; }
            .alarm-meta { text-align: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📊 流量计监控系统</div>
        <ul class="navbar-menu">
            <li><a href="https://zhsw1.pages.dev/dashboard">仪表盘</a></li>
            <li><a href="https://zhsw1.pages.dev/devices">设备管理</a></li>
            <li><a href="https://zhsw1.pages.dev/history">历史数据</a></li>
            <li><a href="https://zhsw1.pages.dev/alarms" class="active">报警中心</a></li>
            <li><a href="https://zhsw1.pages.dev/settings">系统设置</a></li>
        </ul>
        <div class="navbar-user">
            <span id="username">admin</span>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>⚠️ 报警中心</h1>
            <button class="action-btn confirm" onclick="exportAlarms()">📥 导出告警</button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card critical">
                <div class="value" id="criticalCount">2</div>
                <div class="label">严重告警</div>
            </div>
            <div class="stat-card warning">
                <div class="value" id="warningCount">5</div>
                <div class="label">警告</div>
            </div>
            <div class="stat-card info">
                <div class="value" id="infoCount">8</div>
                <div class="label">提示</div>
            </div>
            <div class="stat-card success">
                <div class="value" id="resolvedCount">156</div>
                <div class="label">已处理</div>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="filter-bar">
            <select id="levelFilter" onchange="filterAlarms()">
                <option value="">全部级别</option>
                <option value="critical">严重</option>
                <option value="warning">警告</option>
                <option value="info">提示</option>
            </select>
            <select id="statusFilter" onchange="filterAlarms()">
                <option value="">全部状态</option>
                <option value="pending">待处理</option>
                <option value="processing">处理中</option>
                <option value="resolved">已解决</option>
            </select>
            <select id="deviceFilter" onchange="filterAlarms()">
                <option value="">全部设备</option>
                <option value="FM-B1-003">流量计 B1</option>
                <option value="FM-C2-006">流量计 C2</option>
                <option value="FM-E2-010">流量计 E2</option>
            </select>
        </div>

        <!-- 告警列表 -->
        <div class="alarm-list" id="alarmList"></div>
    </div>

    <script>
        const alarms = [
            { id: 1, level: 'critical', icon: '🔴', title: '流量计 B1 通讯中断', device: 'FM-B1-003', desc: '设备无响应超过30分钟', time: '2026-03-14 15:50', status: 'pending' },
            { id: 2, level: 'critical', icon: '🔴', title: '流量计 E2 通讯中断', device: 'FM-E2-010', desc: '设备无响应超过2小时', time: '2026-03-14 14:00', status: 'processing' },
            { id: 3, level: 'warning', icon: '🟡', title: '流量计 A1 流量异常', device: 'FM-A1-001', desc: '瞬时流量低于设定阈值', time: '2026-03-14 15:30', status: 'pending' },
            { id: 4, level: 'warning', icon: '🟡', title: '流量计 C2 流量异常', device: 'FM-C2-006', desc: '瞬时流量高于设定阈值', time: '2026-03-14 14:20', status: 'pending' },
            { id: 5, level: 'warning', icon: '🟡', title: '流量计 B2 校准提醒', device: 'FM-B2-004', desc: '设备运行超过90天', time: '2026-03-14 12:00', status: 'pending' },
            { id: 6, level: 'info', icon: '🔵', title: '流量计 A1 数据校准', device: 'FM-A1-001', desc: '自动校准完成', time: '2026-03-14 10:00', status: 'resolved' },
            { id: 7, level: 'info', icon: '🔵', title: '系统更新通知', device: '系统', desc: '新版本 v2.1.0 已发布', time: '2026-03-14 09:00', status: 'resolved' }
        ];

        let filteredAlarms = [...alarms];

        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = 'login.html';
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.username) document.getElementById('username').textContent = user.username;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        function filterAlarms() {
            const level = document.getElementById('levelFilter').value;
            const status = document.getElementById('statusFilter').value;
            const device = document.getElementById('deviceFilter').value;

            filteredAlarms = alarms.filter(a => {
                if (level && a.level !== level) return false;
                if (status && a.status !== status) return false;
                if (device && a.device !== device) return false;
                return true;
            });

            renderAlarms();
        }

        function renderAlarms() {
            const container = document.getElementById('alarmList');
            container.innerHTML = filteredAlarms.map(a => `
                <div class="alarm-card ${a.level}">
                    <div class="alarm-icon">${a.icon}</div>
                    <div class="alarm-content">
                        <h3>${a.title}</h3>
                        <p>${a.desc} · ${a.device}</p>
                    </div>
                    <div class="alarm-meta">
                        <span class="alarm-time">${a.time}</span>
                        <span class="status-badge ${a.status}">${a.status === 'pending' ? '待处理' : a.status === 'processing' ? '处理中' : '已解决'}</span>
                        ${a.status !== 'resolved' ? `
                        <div class="alarm-actions" style="margin-top: 10px;">
                            <button class="action-btn confirm" onclick="handleAlarm(${a.id}, 'resolve')">确认</button>
                            <button class="action-btn ignore" onclick="handleAlarm(${a.id}, 'ignore')">忽略</button>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function handleAlarm(id, action) {
            alert(`告警 ${id} 已${action === 'resolve' ? '确认处理' : '忽略'}`);
            filterAlarms();
        }

        function exportAlarms() {
            alert('导出功能开发中...');
        }

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            filterAlarms();
        });
    </script>
</body>
</html>
