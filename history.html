<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流量计监控系统 - 历史数据</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: 600;
            color: #40e0d0;
            text-shadow: 0 0 20px rgba(64, 224, 208, 0.5);
        }

        .navbar-menu {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .navbar-menu a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .navbar-menu a:hover,
        .navbar-menu a.active {
            background: rgba(64, 224, 208, 0.2);
            color: #40e0d0;
        }

        .navbar-user { display: flex; align-items: center; gap: 15px; }
        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 100, 100, 0.3);
            border: 1px solid rgba(255, 100, 100, 0.5);
            border-radius: 8px;
            color: #ff6b6b;
            cursor: pointer;
        }

        .container { padding: 30px; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 { font-size: 28px; }

        .export-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #40e0d0, #00ced1);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
        }

        /* 筛选条件 */
        .filter-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filter-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-row label { color: rgba(255, 255, 255, 0.7); }

        .filter-row select,
        .filter-row input {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
        }

        .filter-row select option { background: #1a1a2e; }

        .search-btn {
            padding: 10px 25px;
            background: rgba(64, 224, 208, 0.2);
            border: 1px solid #40e0d0;
            border-radius: 8px;
            color: #40e0d0;
            cursor: pointer;
        }

        /* 图表区域 */
        .chart-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-section h3 { margin-bottom: 20px; }
        .chart-container { height: 350px; }

        /* 数据表格 */
        .data-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            background: rgba(64, 224, 208, 0.1);
            padding: 15px;
            text-align: left;
            color: #40e0d0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover td { background: rgba(255, 255, 255, 0.03); }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }

        .pagination button {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }

        .pagination button.active {
            background: rgba(64, 224, 208, 0.2);
            border-color: #40e0d0;
            color: #40e0d0;
        }

        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-card .value { font-size: 28px; font-weight: 700; color: #40e0d0; }
        .stat-card .label { color: rgba(255, 255, 255, 0.6); margin-top: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">📊 流量计监控系统</div>
        <ul class="navbar-menu">
            <li><a href="https://zhsw1.pages.dev/dashboard.html">仪表盘</a></li>
            <li><a href="https://zhsw1.pages.dev/devices.html">设备管理</a></li>
            <li><a href="https://zhsw1.pages.dev/history.html" class="active">历史数据</a></li>
            <li><a href="https://zhsw1.pages.dev/alarms.html">报警中心</a></li>
            <li><a href="https://zhsw1.pages.dev/settings.html">系统设置</a></li>
        </ul>
        <div class="navbar-user">
            <span id="username">admin</span>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>📈 历史数据</h1>
            <button class="export-btn" onclick="exportData()">📥 导出数据</button>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="value">12,847</div>
                <div class="label">累计流量 (m³)</div>
            </div>
            <div class="stat-card">
                <div class="value">125.6</div>
                <div class="label">平均流量 (m³/h)</div>
            </div>
            <div class="stat-card">
                <div class="value">98.5%</div>
                <div class="label">设备可用率</div>
            </div>
            <div class="stat-card">
                <div class="value">156</div>
                <div class="label">告警次数</div>
            </div>
        </div>

        <!-- 筛选条件 -->
        <div class="filter-section">
            <div class="filter-row">
                <label>设备：</label>
                <select id="deviceSelect">
                    <option value="">全部设备</option>
                    <option value="FM-A1-001">流量计 A1</option>
                    <option value="FM-A2-002">流量计 A2</option>
                    <option value="FM-B1-003">流量计 B1</option>
                </select>
                
                <label>时间范围：</label>
                <select id="timeRange">
                    <option value="today">今天</option>
                    <option value="week" selected>最近7天</option>
                    <option value="month">最近30天</option>
                    <option value="custom">自定义</option>
                </select>
                
                <label>数据类型：</label>
                <select id="dataType">
                    <option value="flow">流量数据</option>
                    <option value="alarm">告警数据</option>
                    <option value="all">全部</option>
                </select>
                
                <button class="search-btn" onclick="searchData()">🔍 查询</button>
            </div>
        </div>

        <!-- 图表 -->
        <div class="chart-section">
            <h3>📊 流量趋势图</h3>
            <div class="chart-container">
                <canvas id="historyChart"></canvas>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="data-section">
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>设备</th>
                        <th>类型</th>
                        <th>流量 (m³/h)</th>
                        <th>累计 (m³)</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                </tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        // 检查登录
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = 'login.html';
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.username) document.getElementById('username').textContent = user.username;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // 模拟数据
        const records = [];
        const devices = ['FM-A1-001', 'FM-A2-002', 'FM-B1-003', 'FM-B2-004'];
        
        for (let i = 0; i < 50; i++) {
            records.push({
                time: `2026-03-${String(14 - Math.floor(i / 4)).padStart(2, '0')} ${String(24 - (i % 24)).padStart(2, '0')}:00`,
                device: devices[i % devices.length],
                type: '涡街',
                flow: (100 + Math.random() * 60).toFixed(1),
                total: (1000 + i * 10).toFixed(1),
                status: Math.random() > 0.1 ? '正常' : '异常'
            });
        }

        // 渲染图表
        let historyChart;
        function initChart() {
            const ctx = document.getElementById('historyChart').getContext('2d');
            
            const labels = [];
            const data = [];
            for (let i = 6; i >= 0; i--) {
                labels.push(`3/${14 - i}`);
                data.push((100 + Math.random() * 60).toFixed(1));
            }

            historyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '流量 (m³/h)',
                        data: data,
                        borderColor: '#40e0d0',
                        backgroundColor: 'rgba(64, 224, 208, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'rgba(255,255,255,0.6)' } },
                        y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: 'rgba(255,255,255,0.6)' } }
                    }
                }
            });
        }

        // 渲染表格
        function renderTable(page = 1) {
            const perPage = 10;
            const start = (page - 1) * perPage;
            const data = records.slice(start, start + perPage);
            
            document.getElementById('dataTable').innerHTML = data.map(r => `
                <tr>
                    <td>${r.time}</td>
                    <td>${r.device}</td>
                    <td>${r.type}</td>
                    <td>${r.flow}</td>
                    <td>${r.total}</td>
                    <td style="color: ${r.status === '正常' ? '#4ade80' : '#ff6b6b'}">${r.status}</td>
                </tr>
            `).join('');

            // 分页
            const totalPages = Math.ceil(records.length / perPage);
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="${i === page ? 'active' : ''}" onclick="renderTable(${i})">${i}</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        function searchData() {
            alert('查询功能开发中...');
            initChart();
            renderTable();
        }

        function exportData() {
            alert('导出功能开发中...\n格式: Excel/CSV');
        }

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            initChart();
            renderTable();
        });
    </script>
</body>
</html>
